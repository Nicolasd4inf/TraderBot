name: Portfolio Signal Dashboard

on:
  schedule:
    - cron: '0 8-16 * * *'  # Tous les jours toutes les heures de 9h à 17h (UTC+1 hiver)
  workflow_dispatch:          # Déclenchement manuel depuis GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Generate dashboard
        run: python dashboard_claude.py
        env:
          CI: true

      - name: Prepare GitHub Pages
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html
          cp claude_update.txt _site/claude_update.txt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
